<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tantkar - Coming Soon</title>
    <meta name="description" content="Tantkar - Made by Makers. Launching Soon.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <main class="hero-section">

            <!-- Main Content Block -->
            <div class="content-wrapper">

                <div class="main-text-block">
                    <div class="shuttle-logo">
                        <svg width="240" height="60" viewBox="0 0 240 60" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <!-- Outer shell -->
                            <path d="M 20 30 Q 120 0 220 30 Q 120 60 20 30 Z" />
                            <!-- Left & Right holes -->
                            <circle cx="30" cy="30" r="1.5" fill="currentColor" />
                            <circle cx="210" cy="30" r="1.5" fill="currentColor" />
                            <!-- Inner shell -->
                            <path d="M 55 30 Q 120 12 185 30 Q 120 48 55 30 Z" />
                            <!-- Spool left & right caps -->
                            <line x1="85" y1="23" x2="85" y2="37" stroke-width="2" />
                            <line x1="89" y1="24" x2="89" y2="36" stroke-width="1.5" />
                            <line x1="155" y1="23" x2="155" y2="37" stroke-width="2" />
                            <line x1="151" y1="24" x2="151" y2="36" stroke-width="1.5" />
                            <!-- Spool body top and bottom -->
                            <line x1="85" y1="23" x2="155" y2="23" />
                            <line x1="85" y1="37" x2="155" y2="37" />
                            <!-- Wrapped threads -->
                            <path
                                d="M 93 23 L 93 37 M 97 23 L 97 37 M 101 23 L 101 37 M 105 23 L 105 37 M 109 23 L 109 37 M 113 23 L 113 37 M 117 23 L 117 37 M 121 23 L 121 37 M 125 23 L 125 37 M 129 23 L 129 37 M 133 23 L 133 37 M 137 23 L 137 37 M 141 23 L 141 37 M 145 23 L 145 37 M 149 23 L 149 37"
                                stroke-width="1.2" />
                            <!-- Thread extending outward -->
                            <line x1="33" y1="30" x2="85" y2="30" />
                            <line x1="155" y1="30" x2="207" y2="30" />
                        </svg>
                    </div>

                    <h1 class="logo-title">TANTKAR</h1>

                    <div class="divider-with-icon">
                        <span class="line"></span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1">
                            <!-- Butterfly / Leaf motif -->
                            <path d="M12 12C12 12 8 8 6 10C4 12 6 16 12 12Z" fill="currentColor" />
                            <path d="M12 12C12 12 16 8 18 10C20 12 18 16 12 12Z" fill="currentColor" />
                            <path d="M12 12C12 12 10 16 8 18C6 20 10 22 12 12Z" fill="currentColor" opacity="0.6" />
                            <path d="M12 12C12 12 14 16 16 18C18 20 14 22 12 12Z" fill="currentColor" opacity="0.6" />
                        </svg>
                        <span class="line"></span>
                    </div>

                    <h2 class="subtitle">Made by Makers.</h2>

                    <div class="small-diamond-divider">
                        <span class="diamond"></span>
                    </div>

                    <p class="launch-text">LAUNCHING SOON</p>

                    <div class="launch-divider">
                        <span class="line"></span>
                        <span class="diamond"></span>
                        <span class="line"></span>
                    </div>

                    <div class="features-row">
                        <div class="feature-item">
                            <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <!-- Woven pattern / Heritage -->
                                <rect x="6" y="3" width="2" height="18" rx="1" stroke-width="1.2" />
                                <rect x="11" y="3" width="2" height="18" rx="1" stroke-width="1.2" />
                                <rect x="16" y="3" width="2" height="18" rx="1" stroke-width="1.2" />
                                <rect x="3" y="6" width="18" height="2" rx="1" stroke-width="1.2" />
                                <rect x="3" y="11" width="18" height="2" rx="1" stroke-width="1.2" />
                                <rect x="3" y="16" width="18" height="2" rx="1" stroke-width="1.2" />
                            </svg>
                            <span class="feature-text">HERITAGE</span>
                        </div>
                        <div class="feature-separator"></div>
                        <div class="feature-item">
                            <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-linecap="round" stroke-linejoin="round">
                                <!-- Hands holding / Craft -->
                                <path
                                    d="M3 14 L 7 14 C 9 14, 11 15, 13 17 L 15 19 C 16.5 20.5, 19 20.5, 20.5 19 C 22 17.5, 21 15, 19 16 C 17.5 16.7, 16 16.7, 14.5 16 L 12 13"
                                    stroke-width="1.2" />
                                <path d="M12 13 C 13 11, 15 9, 17 9 C 18.5 9, 19 11, 18 12 L 15 15"
                                    stroke-width="1.2" />
                                <path d="M11 14 L 14 11 C 15 10, 16 11, 15 12 L 13 14" stroke-width="1.2" />
                                <circle cx="10" cy="8" r="1.5" stroke-width="1.2" />
                                <path d="M 14 5 L 15 7 L 17 8 L 15 9 L 14 11 L 13 9 L 11 8 L 13 7 Z"
                                    stroke-width="1.2" />
                            </svg>
                            <span class="feature-text">CRAFT</span>
                        </div>
                        <div class="feature-separator"></div>
                        <div class="feature-item">
                            <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-linecap="round" stroke-linejoin="round">
                                <!-- Leaves / Authenticity -->
                                <path d="M 12 22 L 12 14" stroke-width="1.2" />
                                <path d="M 12 14 C 12 14, 7 8, 12 2 C 17 8, 12 14, 12 14 Z" stroke-width="1.2" />
                                <path d="M 12 15 C 12 15, 5 15, 3 8 C 8 9, 12 15, 12 15 Z" stroke-width="1.2" />
                                <path d="M 12 15 C 12 15, 19 15, 21 8 C 16 9, 12 15, 12 15 Z" stroke-width="1.2" />
                                <path d="M 12 14 L 12 6" stroke-width="1.2" />
                                <path d="M 12 15 L 7 12" stroke-width="1.2" />
                                <path d="M 12 15 L 17 12" stroke-width="1.2" />
                            </svg>
                            <span class="feature-text">AUTHENTICITY</span>
                        </div>
                    </div>
                </div>

                <!-- Bottom Aligned Footer Note -->
                <div class="footer-note">
                    <div class="footer-line"></div>
                    <div class="footer-text">
                        HONORING HERITAGE. CELEBRATING CRAFT.<br>
                        BRINGING TIMELESS CREATIONS TO LIFE.
                    </div>
                </div>

            </div>

        </main>


    </div>
</body>

</html>
